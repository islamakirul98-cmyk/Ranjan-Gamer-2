<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --card: #11171e; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 30px; }

        /* NAVBAR */
        .navbar { background: #0d1117; height: 65px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; object-fit: cover; }
        .nav-brand { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* --- CREX STYLE SCORECARD (TOP) --- */
        .crex-box { 
            background: var(--card); margin: 15px; border-radius: 15px; padding: 20px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .match-info { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; align-items: center; gap: 12px; }
        .team img { width: 45px; height: 32px; border-radius: 4px; border: 1px solid #333; }
        .team-name { font-size: 20px; font-weight: bold; }
        .main-score { font-size: 30px; font-weight: 900; }
        .overs { font-size: 14px; color: #8b949e; font-weight: normal; margin-left: 5px; }

        /* VIDEO PLAYER */
        .video-container { background: #000; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .video-js { width: 100% !important; max-width: 1000px; height: 500px !important; margin: 0 auto; }

        /* LIVE CHAT (BOTTOM) */
        .chat-section { padding: 20px 5%; }
        .chat-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: var(--blue); border-left: 5px solid var(--blue); padding-left: 12px; }
        .chat-box { background: var(--card); border-radius: 12px; height: 250px; overflow-y: auto; padding: 15px; border: 1px solid var(--border); }
        .msg { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 14px; }
        .user { font-weight: bold; color: var(--blue); }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        @media (max-width: 768px) { .video-js { height: 280px !important; } .main-score { font-size: 24px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="17741693376793666156839165925370.png" class="nav-logo" alt="RG" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="crex-box">
        <div class="match-info"><span class="dot"></span> Live Match • Ranjan Gamer Special</div>
        <div class="score-row">
            <div class="team"><img src="https://flagcdn.com/w80/in.png"><span class="team-name">IND</span></div>
            <div class="main-score" id="score">184/3 <span class="overs" id="overs">(17.4)</span></div>
            <div class="team"><span class="team-name">AUS</span><img src="https://flagcdn.com/w80/au.png"></div>
        </div>
    </div>

    <div class="video-container">
        <video id="rg-stream" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted preload="auto">
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="chat-section">
        <div class="chat-title">Live Chat</div>
        <div id="chat-msgs" class="chat-box"></div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-stream');
        
        // Auto Score Update (Simulated)
        let r = 184, b = 106;
        setInterval(() => {
            r += Math.floor(Math.random()*2); b++;
            document.getElementById('score').innerHTML = r + "/3 <span class='overs'>(" + Math.floor(b/6) + "." + (b%6) + ")</span>";
        }, 8000);

        // Auto Chat
        const users = ["Bihar_Boy", "Cricket_Fan", "Ranjan_Fan"];
        const texts = ["India jitegi 🇮🇳", "Quality mast hai bhai!", "Love from Bihar ❤️"];
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div'); d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*3)]}:</span> ${texts[Math.floor(Math.random()*3)]}`;
            cb.appendChild(d); cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 8) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer | Pro Sports OTT</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #030b17; --nav: #121921; --blue: #1f80e0; --card-bg: #192133; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }

        .navbar { background: var(--nav); height: 72px; display: flex; align-items: center; padding: 0 4%; position: fixed; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { height: 40px; margin-right: 30px; border-radius: 5px; border: 1px solid var(--blue); }

        .main-view { padding-top: 72px; display: flex; flex-wrap: wrap; background: #000; }
        .player-side { flex: 3; min-width: 300px; position: relative; transition: 0.5s; }
        
        /* Default Player Size */
        .video-js { width: 100% !important; height: 500px !important; margin: 0 auto; }

        /* Settings Bar */
        .settings-bar { background: #1a242f; padding: 10px 4%; display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #333; }
        .settings-bar select { background: #0b1119; color: white; border: 1px solid var(--blue); padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .chat-side { flex: 1; min-width: 300px; background: #0f171e; height: 500px; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: #1a242f; font-weight: bold; border-bottom: 1px solid #333; color: var(--blue); font-size: 14px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .msg { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; }
        .user { color: #00d2ff; font-weight: bold; margin-right: 5px; }

        .stream-info { padding: 20px 4%; background: linear-gradient(to bottom, #000, var(--bg)); width: 100%; }
        .view-count { color: #ff0000; font-weight: bold; font-size: 14px; margin-top: 5px; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: #ff0000; border-radius: 50%; display: inline-block; margin-right: 7px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000034992.png" class="nav-logo" alt="Ranjan Gamer" onerror="this.src='https://via.placeholder.com/150?text=RANJAN'">
        <span style="font-weight:bold; color:var(--blue);">RANJAN SPORTS LIVE</span>
    </nav>

    <div class="main-view">
        <div class="player-side" id="p-side">
            <video id="h-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
                <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div class="chat-side">
            <div class="chat-header">LIVE SPORTS CHAT</div>
            <div id="chat-box" class="chat-messages">
                <div class="msg"><span class="user">Admin:</span> Quality setting check karein!</div>
            </div>
        </div>
    </div>

    <div class="settings-bar">
        <span>⚙️ Quality:</span>
        <select id="quality-select">
            <option value="auto">Auto (Best)</option>
            <option value="1080p">1080p HD</option>
            <option value="720p">720p HD</option>
            <option value="480p">480p SD</option>
        </select>

        <span>🖥️ Player Size:</span>
        <select id="size-select" onchange="changeSize()">
            <option value="normal">Normal</option>
            <option value="large">Cinema Mode (Full Width)</option>
            <option value="small">Compact</option>
        </select>
    </div>

    <div class="stream-info">
        <h1 id="playing-title" style="font-size:22px; margin:0;">Live Sports Amagi Feed</h1>
        <div class="view-count">
            <span class="dot"></span> <span id="v-count">56</span> Watching Now
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const hPlayer = videojs('h-player');
        
        // 1. FAKE VIEWS
        setInterval(() => {
            let views = Math.floor(Math.random() * (60 - 50 + 1)) + 50;
            document.getElementById('v-count').innerText = views;
        }, 5000);

        // 2. FAKE CHAT
        const users = ["Cricket_Fan", "Sports_Bihar", "King_Ranjan", "Saurav_S", "MatchDay"];
        const texts = ["Match badhiya chal raha hai", "Full HD quality hai!", "Love from Bihar ❤️", "Sixer!!! 🔥", "India hi jitegi"];
        
        setInterval(() => {
            const chatBox = document.getElementById('chat-box');
            const newMsg = document.createElement('div');
            newMsg.className = 'msg';
            newMsg.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> ${texts[Math.floor(Math.random()*texts.length)]}`;
            chatBox.appendChild(newMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
            if(chatBox.children.length > 10) chatBox.removeChild(chatBox.firstChild);
        }, 4000);

        // 3. PLAYER SIZE SETTING
        function changeSize() {
            const size = document.getElementById('size-select').value;
            const pSide = document.getElementById('p-side');
            const videoElement = document.getElementById('h-player');

            if(size === "large") {
                pSide.style.flex = "10";
                videoElement.style.height = "650px";
            } else if(size === "small") {
                pSide.style.flex = "2";
                videoElement.style.height = "350px";
            } else {
                pSide.style.flex = "3";
                videoElement.style.height = "500px";
            }
        }

        // Quality setting (Simulated for HLS)
        document.getElementById('quality-select').onchange = function() {
            alert("Quality setting " + this.value + " apply ho rahi hai...");
        };
    </script>
</body>
</html>

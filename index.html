<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer | Live Cricket</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #ffffff; --google-blue: #1a73e8; --text-main: #202124; --border: #dadce0; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Roboto', sans-serif; margin: 0; }

        /* Navbar */
        .navbar { background: #fff; height: 65px; display: flex; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-logo { height: 40px; margin-right: 15px; border-radius: 50%; border: 2px solid var(--google-blue); }
        .brand-name { font-size: 20px; font-weight: bold; color: var(--google-blue); }

        /* Player Section (Black Background for Video) */
        .video-container { background: #000; text-align: center; }
        .video-js { width: 100% !important; max-width: 900px; height: 500px !important; margin: 0 auto; }

        /* --- GOOGLE STYLE SCORECARD (Top) --- */
        .google-card { max-width: 900px; margin: 20px auto; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(32,33,36,0.1); }
        .card-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .live-tag { background: #d93025; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .score-box { padding: 20px; display: flex; justify-content: space-around; align-items: center; text-align: center; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team img { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); }
        .team-code { font-size: 22px; font-weight: bold; }
        .main-score { font-size: 32px; font-weight: bold; }
        
        /* Detailed Table Style */
        .details-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .details-table th { background: #f8f9fa; text-align: left; padding: 10px; border-bottom: 1px solid var(--border); color: #70757a; }
        .details-table td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .striker { color: var(--google-blue); font-weight: bold; }

        /* --- COMMENT SECTION (Bottom) --- */
        .comment-container { max-width: 900px; margin: 30px auto; padding: 0 10px; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--google-blue); display: inline-block; }
        .chat-box { background: #f1f3f4; border-radius: 8px; height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user { font-weight: bold; color: var(--google-blue); margin-right: 8px; }

        .view-info { text-align: center; color: #70757a; font-size: 13px; margin: 10px 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000034992.png" class="nav-logo" alt="Ranjan Gamer" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="brand-name">RANJAN GAMER LIVE</span>
    </nav>

    <div class="video-container">
        <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="view-info">🔴 <span id="views">57</span> people watching now</div>

    <div class="google-card">
        <div class="card-header">
            <span style="font-weight:bold;">ICC Men's T20 World Cup</span>
            <span class="live-tag">LIVE</span>
        </div>
        
        <div class="score-box">
            <div class="team">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Flag_of_India.svg/1200px-Flag_of_India.svg.png">
                <span class="team-code">IND</span>
            </div>
            <div class="main-score" id="score-text">184/3 (17.4)</div>
            <div class="team">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Flag_of_Australia_%28converted%29.svg/1200px-Flag_of_Australia_%28converted%29.svg.png">
                <span class="team-code">AUS</span>
            </div>
        </div>

        <table class="details-table">
            <thead>
                <tr>
                    <th>Batsman</th>
                    <th>R</th>
                    <th>B</th>
                    <th>4s</th>
                    <th>6s</th>
                    <th>SR</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="striker">V. Kohli*</td>
                    <td id="run1">74</td>
                    <td>42</td>
                    <td>6</td>
                    <td>3</td>
                    <td>176.2</td>
                </tr>
                <tr>
                    <td>H. Pandya</td>
                    <td id="run2">12</td>
                    <td>8</td>
                    <td>1</td>
                    <td>1</td>
                    <td>150.0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="comment-container">
        <div class="section-title">Live Comments</div>
        <div id="chat-box" class="chat-box">
            <div class="msg"><span class="user">Ranjan Gamer:</span> Match ka maza lo dosto! Like zaroor karein.</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Fake Views Update
        setInterval(() => {
            document.getElementById('views').innerText = Math.floor(Math.random() * (60 - 50 + 1)) + 50;
        }, 5000);

        // Fake Score Update (Google Style)
        let totalRuns = 184;
        let totalBalls = 106;
        setInterval(() => {
            totalRuns += Math.floor(Math.random() * 2);
            totalBalls++;
            let ov = Math.floor(totalBalls/6) + "." + (totalBalls%6);
            document.getElementById('score-text').innerText = totalRuns + "/3 (" + ov + ")";
            document.getElementById('run1').innerText = totalRuns - 110;
        }, 8000);

        // Fake Chat (Bottom)
        const names = ["Aman_Bihar", "CricketLover", "Sunit_Kumar", "Raj_Sports", "Vikash_G"];
        const cmnts = ["India jitega 🇮🇳", "Kohli is king!", "Mast stream Ranjan bhai", "Scorecard ekdum real hai", "Sixerrrrr!! 🔥"];
        
        setInterval(() => {
            const cb = document.getElementById('chat-box');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user">${names[Math.floor(Math.random()*names.length)]}:</span> ${cmnts[Math.floor(Math.random()*cmnts.length)]}`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 8) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

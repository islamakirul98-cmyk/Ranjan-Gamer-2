<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ranjan Gamer</title>
    <style>
        :root { --bg: #030b17; --blue: #1f80e0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .login-card {
            width: 100%; max-width: 380px; padding: 40px 25px;
            text-align: center; background: rgba(255,255,255,0.01);
        }

        /* Ranjan Gamer Star Logo */
        .logo-img { 
            width: 90px; height: 90px; border-radius: 50%; 
            border: 3px solid var(--blue); margin-bottom: 25px; 
            box-shadow: 0 0 15px rgba(31,128,224,0.4); 
        }
        
        h2 { font-size: 22px; margin-bottom: 8px; font-weight: 500; }
        p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 35px; }

        /* Mobile Input Area */
        .input-container { position: relative; margin-bottom: 25px; }
        .country-code { 
            position: absolute; left: 0; top: 12px; font-size: 18px; 
            font-weight: bold; color: #fff; border-right: 1px solid #333; padding-right: 10px;
        }
        input[type="tel"] {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid #333; color: #fff; font-size: 20px;
            padding: 12px 5px 12px 55px; outline: none; box-sizing: border-box;
            transition: 0.3s; letter-spacing: 1px;
        }
        input[type="tel"]:focus { border-bottom-color: var(--blue); }

        .action-btn {
            width: 100%; background: var(--blue); color: white; border: none; 
            padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
            transition: 0.3s;
        }
        .action-btn:hover { background: #1159a1; }

        .footer-text { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 40px; line-height: 1.5; }
        .link { color: var(--blue); text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="17741693376793666156839165925370.png" class="logo-img" alt="RG Logo" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        
        <div id="login-form">
            <h2>Login to continue</h2>
            <p>Enter your mobile number to start watching</p>
            
            <div class="input-container">
                <span class="country-code">+91</span>
                <input type="tel" id="mobileNumber" placeholder="Mobile Number" maxlength="10">
            </div>
            
            <button class="action-btn" onclick="directLogin()">Login</button>
        </div>

        <p class="footer-text">
            By proceeding, you agree to the <a href="#" class="link">Terms of Use</a> <br> and <a href="#" class="link">Privacy Policy</a>
        </p>
    </div>

    <script>
        function directLogin() {
            const num = document.getElementById('mobileNumber').value;

            if(num.length === 10) {
                // Seedhe Redirect - Na OTP, Na Fake Wait
                window.location.href = "index.html"; 
            } else {
                alert("Bhai, 10 digit ka sahi mobile number daalo!");
            }
        }
    </script>
</body>
</html>

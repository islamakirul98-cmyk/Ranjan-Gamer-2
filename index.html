<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | IPL LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --card: #11171e; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 20px; }

        /* NAVBAR */
        .navbar { background: #0d1117; height: 60px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; }
        .nav-brand { font-size: 20px; font-weight: 900; letter-spacing: 1px; }

        /* 1. VIDEO PLAYER (TOP) */
        .video-box { background: #000; width: 100%; border-bottom: 2px solid var(--border); }
        .video-js { width: 100% !important; max-width: 900px; height: 450px !important; margin: 0 auto; }

        /* 2. REAL IPL SCOREBOARD (JUST BELOW VIDEO) */
        .score-wrap { padding: 15px; text-align: center; }
        .real-ipl-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--border); max-width: 860px; margin: 0 auto; min-height: 140px;
        }

        /* 3. GLOBAL CHAT BOX (BOTTOM) */
        .chat-section { padding: 0 15px; max-width: 860px; margin: 20px auto; }
        .chat-title { font-size: 16px; font-weight: bold; color: var(--blue); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        #chat-window { 
            background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0;
            height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 6px; border-left: 3px solid var(--accent); font-size: 13px; }
        .user-name { font-weight: bold; color: var(--blue); margin-right: 6px; }

        .input-bar { 
            display: flex; gap: 5px; background: #1c222a; padding: 10px; 
            border-radius: 0 0 10px 10px; border: 1px solid var(--border); border-top: none;
        }
        .input-bar input { 
            flex: 1; background: #0d1117; border: 1px solid #333; color: #fff; padding: 12px; 
            border-radius: 5px; outline: none; font-size: 14px;
        }
        .send-btn { width: 60px; background: var(--blue); border: none; color: #fff; border-radius: 5px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .video-js { height: 260px !important; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="17741693376793666156839165925370.png" class="nav-logo" alt="RG" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="video-box">
        <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="score-wrap">
        <div class="real-ipl-card">
            <iframe src="https://www.scorebat.com/embed/livescore/" 
                    style="width:100%; height:140px; border:none;" 
                    scrolling="yes"></iframe>
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-title">🌎 Global Fan Chat (Live)</div>
        <div id="chat-window">
            <div class="msg"><span class="user-name">System:</span> Welcome! International fans are joining...</div>
        </div>
        <div class="input-bar">
            <input type="text" id="my-msg" placeholder="Type your message here...">
            <button class="send-btn" onclick="userSend()">➤</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Random Global Names List
        const globalUsers = [
            "Aarav_IND 🇮🇳", "Steve_AUS 🇦🇺", "Joe_ENG 🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Babar_Fan_PAK 🇵🇰", 
            "Faf_RSA 🇿🇦", "Kane_NZ 🇳🇿", "Rashid_AFG 🇦🇫", "Chris_WI 🌴", 
            "IPL_Lover_Mumbai", "Dhoni_Fan_7", "Kohli_King_18"
        ];
        
        const fakeTexts = [
            "IPL is the best! 🔥", "What a shot! Incredible.", "Who will win today?", 
            "Love from India! ❤️", "Miss you ABD!", "Bowling is too good.", 
            "Big sixer!!! 🏏", "Quality stream, thanks Ranjan Gamer."
        ];

        // System Random Chat
        setInterval(() => {
            addMessage(globalUsers[Math.floor(Math.random()*globalUsers.length)], fakeTexts[Math.floor(Math.random()*fakeTexts.length)]);
        }, 6000);

        // User Send with Random Name
        function userSend() {
            const text = document.getElementById('my-msg').value;
            if(text.trim() !== "") {
                const randomName = globalUsers[Math.floor(Math.random()*globalUsers.length)];
                addMessage(randomName, text);
                document.getElementById('my-msg').value = "";
            }
        }

        function addMessage(user, text) {
            const win = document.getElementById('chat-window');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user-name">${user}:</span> ${text}`;
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
            if(win.children.length > 15) win.removeChild(win.firstChild);
        }
    </script>
</body>
</html>

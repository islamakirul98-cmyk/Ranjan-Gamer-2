<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | CREX LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #0b0f16; --card: #161b22; --accent: #ff0050; --blue: #00d2ff; --border: #21262d; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }

        /* NAVBAR */
        .navbar { background: #12171e; height: 65px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; }
        .nav-brand { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* --- CREX STYLE SCORECARD (AB UPAR) --- */
        .crex-scorecard { background: var(--card); margin: 10px; border-radius: 12px; padding: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .match-status { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; }
        .live-dot { height: 6px; width: 6px; background: var(--accent); border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        
        .main-score-row { display: flex; justify-content: space-between; align-items: center; }
        .team-info { display: flex; align-items: center; gap: 10px; }
        .team-flag { width: 35px; height: 25px; object-fit: cover; border-radius: 3px; }
        .team-name { font-size: 18px; font-weight: bold; }
        .score-big { font-size: 24px; font-weight: 900; color: #fff; }
        .overs-small { font-size: 13px; color: #8b949e; margin-left: 5px; }

        .batsman-strip { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13px; }
        .bat-name { color: #c9d1d9; }
        .bat-runs { font-weight: bold; color: #fff; }

        /* PLAYER SECTION */
        .video-container { background: #000; width: 100%; text-align: center; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .video-js { width: 100% !important; max-width: 900px; height: 450px !important; margin: 0 auto; }

        /* COMMENTS SECTION (AB NICHE) */
        .comment-area { padding: 20px 4%; }
        .comment-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: var(--blue); border-left: 4px solid var(--blue); padding-left: 10px; }
        .chat-box { background: var(--card); border-radius: 10px; height: 250px; overflow-y: auto; padding: 15px; border: 1px solid var(--border); }
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
        .user { font-weight: bold; color: var(--blue); font-size: 13px; }
        .text { font-size: 13px; color: #e6edf3; margin-left: 5px; }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        @media (max-width: 768px) { .video-js { height: 250px !important; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000035171.jpg" class="nav-logo" alt="RG" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="crex-scorecard">
        <div class="match-status"><span class="live-dot"></span> Live • 1st T20i • Mumbai</div>
        <div class="main-score-row">
            <div class="team-info">
                <img src="https://flagcdn.com/w80/in.png" class="team-flag">
                <span class="team-name">IND</span>
            </div>
            <div class="score-big" id="live-score">184/3 <span class="overs-small" id="live-overs">(17.4)</span></div>
            <div class="team-info">
                <span class="team-name">AUS</span>
                <img src="https://flagcdn.com/w80/au.png" class="team-flag">
            </div>
        </div>
        <div class="batsman-strip">
            <div><span class="bat-name">V Kohli*</span> <span class="bat-runs" id="r1">74(42)</span></div>
            <div><span class="bat-name">H Pandya</span> <span class="bat-runs" id="r2">12(8)</span></div>
            <div style="color:var(--blue)">CRR: 10.41</div>
        </div>
    </div>

    <div class="video-container">
        <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="comment-area">
        <div class="comment-title">Live Fan Chat</div>
        <div id="chat-msgs" class="chat-box">
            <div class="msg"><span class="user">System:</span> Welcome! Enjoy real-time Crex score update.</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Crex Real Score Simulation
        let runs = 184, balls = 106;
        setInterval(() => {
            runs += Math.floor(Math.random() * 2); balls++;
            let ov = Math.floor(balls/6) + "." + (balls%6);
            document.getElementById('live-score').innerHTML = `${runs}/3 <span class="overs-small">(${ov})</span>`;
            document.getElementById('r1').innerText = (runs - 110) + "(45)";
        }, 7000);

        // Niche Chat Logic
        const users = ["Bihar_Boy", "Cricket_Guru", "Ranjan_Fan", "Saurav_Sports"];
        const texts = ["India will win! 🇮🇳", "Crex score is so fast", "Love from Bihar ❤️", "Kohli is King! 👑"];
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> <span class="text">${texts[Math.floor(Math.random()*texts.length)]}</span>`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 8) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --google-blue: #1a73e8; --border: #dadce0; --bg: #ffffff; }
        body { background: var(--bg); color: #202124; font-family: 'Roboto', sans-serif; margin: 0; }

        /* NAVBAR */
        .navbar { background: #fff; height: 70px; display: flex; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        
        /* Direct Raw Link from your GitHub to bypass Cache */
        .star-logo {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--google-blue); margin-right: 12px; object-fit: cover;
            content: url('https://raw.githubusercontent.com/islamakiru198-cmyk/Ranjan-Gamer-2/main/1000035171.jpg');
        }
        .brand { font-size: 22px; font-weight: bold; color: var(--google-blue); text-transform: uppercase; letter-spacing: 1px; }

        /* PLAYER AREA */
        .video-box { background: #000; text-align: center; }
        .video-js { width: 100% !important; max-width: 900px; height: 500px !important; margin: 0 auto; }

        /* GOOGLE STYLE SCORECARD */
        .score-card { max-width: 900px; margin: 20px auto; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
        .match-header { padding: 12px 20px; background: #f8f9fa; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: bold; }
        .live-btn { background: #d93025; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        
        .score-main { padding: 25px; display: flex; justify-content: space-around; align-items: center; }
        .score-num { font-size: 36px; font-weight: bold; }
        .team-flag { width: 55px; height: 38px; border: 1px solid #ddd; object-fit: cover; }

        .batsman-table { width: 100%; border-collapse: collapse; }
        .batsman-table th { text-align: left; padding: 10px; background: #f1f3f4; font-size: 13px; color: #5f6368; }
        .batsman-table td { padding: 12px 10px; border-top: 1px solid #eee; font-size: 14px; }

        /* LIVE CHAT */
        .chat-container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .chat-box { background: #f1f3f4; border-radius: 10px; height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid var(--border); }
        .msg { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .user { font-weight: bold; color: var(--google-blue); }
        
        .v-info { text-align: center; color: #70757a; font-size: 13px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <img class="star-logo" alt="Ranjan Gamer">
        <span class="brand">RANJAN GAMER</span>
    </nav>

    <div class="video-box">
        <video id="rg-stream" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="v-info">🔴 <span id="v-count">56</span> Watching Now</div>

    <div class="score-card">
        <div class="match-header"><span>IND vs AUS - T20 World Cup</span> <span class="live-btn">LIVE</span></div>
        <div class="score-main">
            <div style="text-align:center;"><img src="https://flagcdn.com/w80/in.png" class="team-flag"><br><b>IND</b></div>
            <div class="score-num" id="live-run">184/3 (17.4)</div>
            <div style="text-align:center;"><img src="https://flagcdn.com/w80/au.png" class="team-flag"><br><b>AUS</b></div>
        </div>
        <table class="batsman-table">
            <thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th></tr></thead>
            <tbody>
                <tr><td style="color:var(--google-blue); font-weight:bold;">V. Kohli*</td><td id="r1">74</td><td>42</td><td>6</td><td>3</td></tr>
                <tr><td>H. Pandya</td><td>12</td><td>8</td><td>1</td><td>1</td></tr>
            </tbody>
        </table>
    </div>

    <div class="chat-container">
        <h3 style="border-left: 5px solid var(--google-blue); padding-left: 12px; margin-bottom: 15px;">Fan Chat</h3>
        <div id="chat-msgs" class="chat-box"></div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-stream');

        // Views Counter
        setInterval(() => {
            document.getElementById('v-count').innerText = Math.floor(Math.random() * (60 - 50 + 1)) + 50;
        }, 4000);

        // Score Update
        let r = 184, b = 106;
        setInterval(() => {
            r += Math.floor(Math.random() * 2); b++;
            let ov = Math.floor(b/6) + "." + (b%6);
            document.getElementById('live-run').innerText = r + "/3 (" + ov + ")";
            document.getElementById('r1').innerText = r - 110;
        }, 8000);

        // Chat
        const users = ["Cricket_Fan", "Ritesh_Bihar", "Saurav_YT", "MatchDay"];
        const texts = ["India match jitegi pakka 🇮🇳", "Ranjan bhai mast quality hai", "Love from Bihar ❤️", "Kohli is King! 👑"];
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div'); d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> ${texts[Math.floor(Math.random()*texts.length)]}`;
            cb.appendChild(d); cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 8) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

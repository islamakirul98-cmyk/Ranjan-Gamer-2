<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ vs SA LIVE | RANJAN GAMER</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --card: #11171e; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 20px; overflow-x: hidden; }

        /* NAVBAR */
        .navbar { background: #0d1117; height: 60px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; }
        .nav-brand { font-size: 20px; font-weight: 900; letter-spacing: 1px; }

        /* VIDEO PLAYER */
        .video-box { background: #000; width: 100%; border-bottom: 2px solid var(--border); }
        .video-js { width: 100% !important; max-width: 900px; height: 450px !important; margin: 0 auto; }

        /* VERIFIED SCORECARD (NO IFRAME) */
        .score-wrap { padding: 15px; }
        .score-card-box { 
            background: var(--card); border-radius: 12px; padding: 15px; 
            border: 1px solid var(--border); max-width: 860px; margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .m-header { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 12px; text-transform: uppercase; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        .s-row { display: flex; justify-content: space-between; align-items: center; }
        .t-info { display: flex; align-items: center; gap: 10px; }
        .t-info img { width: 35px; height: 24px; border-radius: 3px; border: 1px solid #333; }
        .t-name { font-size: 18px; font-weight: bold; }
        .big-s { font-size: 26px; font-weight: 900; color: #fff; }
        .ovs { font-size: 14px; color: #8b949e; font-weight: normal; margin-left: 5px; }

        .batsman-info { margin-top: 12px; padding-top: 10px; border-top: 1px solid #222; font-size: 13px; color: #8b949e; display: flex; justify-content: space-between; }

        /* GLOBAL CHAT */
        .chat-section { padding: 0 15px; max-width: 860px; margin: 20px auto; }
        #chat-window { 
            background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0;
            height: 220px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px;
        }
        .msg { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 6px; border-left: 3px solid var(--accent); font-size: 13px; }
        .user-name { font-weight: bold; color: var(--blue); margin-right: 6px; }

        .input-bar { display: flex; gap: 5px; background: #1c222a; padding: 10px; border-radius: 0 0 10px 10px; border: 1px solid var(--border); border-top: none; }
        .input-bar input { flex: 1; background: #0d1117; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; outline: none; }
        .send-btn { width: 50px; background: var(--blue); border: none; color: #fff; border-radius: 5px; cursor: pointer; font-size: 18px; }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        @media (max-width: 768px) { .video-js { height: 240px !important; } .big-s { font-size: 22px; } .t-name { font-size: 16px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="17741693376793666156839165925370.png" class="nav-logo" alt="RG">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="video-box">
        <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="score-wrap">
        <div class="score-card-box">
            <div class="m-header"><span class="dot"></span> LIVE • NZ vs SA (1st Test)</div>
            <div class="s-row">
                <div class="t-info"><img src="https://flagcdn.com/w80/nz.png"><span class="t-name">NZ</span></div>
                <div class="big-s" id="score-val">252/4 <span class="ovs" id="ov-val">(80.1)</span></div>
                <div class="t-info"><span class="t-name">SA</span><img src="https://flagcdn.com/w80/za.png"></div>
            </div>
            <div class="batsman-info">
                <span><span style="color:var(--blue)">Batting:</span> K. Williamson 108*(192)</span>
                <span>D. Mitchell 44(74)</span>
            </div>
        </div>
    </div>

    <div class="chat-section">
        <div id="chat-window">
            <div class="msg"><span class="user-name">System:</span> NZ vs SA Match Live! Global fans joining...</div>
        </div>
        <div class="input-bar">
            <input type="text" id="m-text" placeholder="Type message...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Automatic Score Script (Verified)
        let runs = 252, balls = 481;
        setInterval(() => {
            runs += Math.floor(Math.random() * 2); balls++;
            let over = Math.floor(balls/6) + "." + (balls%6);
            document.getElementById('score-val').innerHTML = runs + "/4 <span class='ovs'>(" + over + ")</span>";
        }, 8000);

        const users = ["Kiwis_Fan_NZ 🇳🇿", "Proteas_Army_RSA 🇿🇦", "Cricket_Expert 🏏", "Global_Fan", "Ranjan_Live"];
        const texts = ["Williamson is a legend! 🏏", "SA bowlers need a wicket.", "Quality stream, love it!", "NZ in control."];

        // Auto Fake Chat
        setInterval(() => {
            add(users[Math.floor(Math.random()*5)], texts[Math.floor(Math.random()*4)]);
        }, 6000);

        function send() {
            const txt = document.getElementById('m-text').value;
            if(txt.trim() !== "") {
                add(users[Math.floor(Math.random()*5)], txt);
                document.getElementById('m-text').value = "";
            }
        }

        function add(u, t) {
            const w = document.getElementById('chat-window');
            const d = document.createElement('div'); d.className = 'msg';
            d.innerHTML = `<span class="user-name">${u}:</span> ${t}`;
            w.appendChild(d); w.scrollTop = w.scrollHeight;
            if(w.children.length > 15) w.removeChild(w.firstChild);
        }
    </script>
</body>
</html>

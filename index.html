<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | LIVE TV</title>
    <style>
        :root { --main-bg: #0f1014; --card-bg: #1a1c22; --accent: #1f80e0; --live-red: #ff0037; }
        body { background: var(--main-bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }

        /* HEADER */
        .navbar { height: 60px; display: flex; align-items: center; padding: 0 20px; background: rgba(15, 16, 20, 0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #2a2d36; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent); text-transform: uppercase; }

        /* SECTION STYLE */
        .section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .section-title span { color: var(--accent); }

        .horizontal-scroll { 
            display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px; 
            scrollbar-width: none; 
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        /* PREMIUM NEWS CARD */
        .channel-card { 
            min-width: 160px; background: var(--card-bg); border-radius: 12px; 
            overflow: hidden; border: 1px solid #2a2d36; transition: 0.3s; cursor: pointer;
        }
        .channel-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .thumb { width: 100%; height: 90px; background: #222; position: relative; display: flex; align-items: center; justify-content: center; }
        .thumb img { height: 60%; object-fit: contain; }
        .live-tag { position: absolute; top: 8px; left: 8px; background: var(--live-red); padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; animation: blink 1s infinite; }
        
        .info { padding: 12px; text-align: center; background: #1a1c22; }
        .info h3 { font-size: 14px; margin: 0; font-weight: 600; }
        .info p { font-size: 11px; color: #888; margin: 4px 0 0; }

        /* PILLS CATEGORY */
        .pills { display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto; }
        .pill { background: #2a2d36; padding: 8px 20px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; border: 1px solid transparent; }
        .pill.active { background: rgba(31, 128, 224, 0.2); border-color: var(--accent); color: var(--accent); }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.6;} }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">RANJAN GAMER <span style="color:#fff">TV</span></div>
    </nav>

    <div class="pills">
        <div class="pill active">All Live</div>
        <div class="pill">Cricket</div>
        <div class="pill">News</div>
        <div class="pill">Entertainment</div>
    </div>

    <div class="section-title"><span>●</span> Live News Channels</div>
    <div class="horizontal-scroll">
        
        <div class="channel-card" onclick="openPlayer('https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8', 'Aaj Tak HD')">
            <div class="thumb">
                <div class="live-tag">LIVE</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Aaj_Tak_Logo.png" alt="Aaj Tak">
            </div>
            <div class="info">
                <h3>Aaj Tak</h3>
                <p>Sabse Tez • Hindi News</p>
            </div>
        </div>

        <div class="channel-card" onclick="openPlayer('https://xlbor37ydvaj-hls-live.wmncdn.net/firstindianewstv1/live.stream/index.m3u8', 'First India News')">
            <div class="thumb">
                <div class="live-tag">LIVE</div>
                <img src="https://via.placeholder.com/80x40/222/fff?text=NEWS" alt="News">
            </div>
            <div class="info">
                <h3>First India News</h3>
                <p>Regional News 24/7</p>
            </div>
        </div>

    </div>

    <div class="section-title"><span>●</span> Live Sports</div>
    <div class="horizontal-scroll">
        <div class="channel-card" onclick="openPlayer('https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8', 'Sports Live')">
            <div class="thumb">
                <div class="live-tag">LIVE</div>
                <img src="https://via.placeholder.com/80x40/222/fff?text=CRICKET" alt="Cricket">
            </div>
            <div class="info">
                <h3>NZ vs SA</h3>
                <p>1st Test • Day 2</p>
            </div>
        </div>
    </div>

    <script>
        // Function to open player with selected link
        function openPlayer(link, title) {
            // Hum link ko URL parameter ke through player page pe bhej rahe hain
            window.location.href = `player.html?src=${encodeURIComponent(link)}&name=${encodeURIComponent(title)}`;
        }
    </script>

</body>
</html>

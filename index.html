<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer Pro Live</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .header { margin-top: 10px; margin-bottom: 20px; }
        
        /* Logo Styling - Pro Gamer Look */
        .logo { 
            width: 150px; 
            height: 150px;
            border-radius: 20px; 
            border: 3px solid #ff0050; 
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.7);
            background: #000;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .player-box { 
            max-width: 900px; 
            margin: 0 auto; 
            border: 2px solid rgba(255, 0, 80, 0.4); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 1); 
        }
        .video-js { width: 100% !important; height: 500px !important; }
        
        h1 { 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 10px 0;
            text-shadow: 0 0 15px #ff0050;
            font-size: 32px;
        }
        .live-status {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.postimg.cc/856vj6xN/Ranjan-Gamer-Logo.png" class="logo" alt="Ranjan Gamer Logo">
        <h1>Ranjan Gamer Pro Live</h1>
        <div class="live-status">● LIVE STREAMING ON</div>
    </div>

    <div class="player-box">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay muted>
            <source src="http://116.90.120.151:8000/play/a0hi/index.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <p style="color: #444; margin-top: 30px; font-size: 12px;">
        Settings Check: Browser setting mein "Insecure Content" <b>Allow</b> karein tabhi video dikhegi.
    </p>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        player.ready(function() {
            player.play();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }

        /* HEADER & BIG STAR LOGO */
        .header { 
            width: 100%; padding: 40px 0; 
            background: linear-gradient(to bottom, #1a0208, #05070a);
            text-align: center; border-bottom: 2px solid #ff0050;
        }
        .star-logo {
            width: 180px; height: 180px;
            filter: drop-shadow(0 0 20px #ff0050);
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #ff0050); }
            to { filter: drop-shadow(0 0 30px #ff0050); }
        }

        /* PLAYER AREA */
        .main-content { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .video-box { 
            background: #000; border-radius: 15px; overflow: hidden; 
            border: 2px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .video-js { width: 100% !important; height: 500px !important; }

        /* LIVE VIEWS BAR */
        .info-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5px; border-bottom: 1px solid #222;
        }
        .live-tag { background: #ff0050; color: white; padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; margin-right: 10px; }
        .views { color: #888; font-size: 14px; font-weight: bold; }

        /* SPORTS CHAT (NICHE) */
        .chat-container { margin-top: 20px; background: #0f1217; border-radius: 12px; border: 1px solid #1f232b; }
        .chat-head { padding: 15px; border-bottom: 1px solid #1f232b; color: #ff0050; font-weight: bold; }
        .chat-box { height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border-left: 3px solid #ff0050; }
        .user { color: #00d2ff; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="17741693376793666156839165925370.png" class="star-logo" alt="Ranjan Gamer" onerror="this.src='https://via.placeholder.com/180?text=RANJAN+GAMER'">
        <h1 style="margin-top:20px; letter-spacing:3px; text-transform:uppercase; font-size:28px;">Ranjan <span style="color:#ff0050">Gamer</span></h1>
    </div>

    <div class="main-content">
        <div class="video-box">
            <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
                <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div class="info-bar">
            <div><span class="live-tag">LIVE</span> <span style="font-weight:bold;">Sports Main Feed</span></div>
            <div class="views">🔴 <span id="v-count">58</span> watching now</div>
        </div>

        <div class="chat-container">
            <div class="chat-head">LIVE SPORTS CHAT</div>
            <div id="chat-msgs" class="chat-box">
                <div class="msg"><span class="user">Admin:</span> Welcome to Ranjan Gamer Live! Enjoy the match.</div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Fake Views (50-60)
        setInterval(() => {
            document.getElementById('v-count').innerText = Math.floor(Math.random() * (60 - 50 + 1)) + 50;
        }, 5000);

        // Fake Sports Chat Logic
        const users = ["Cricket_Fan", "Ritesh_Bihar", "Saurav_Sports", "Kohli_Fan", "Bihar_Boy"];
        const texts = ["India match jitegi pakka 🇮🇳", "Ranjan bhai mast quality hai", "Love from Bihar ❤️", "Sixer!!! 🔥", "Kya bowling ho rahi hai"];
        
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> ${texts[Math.floor(Math.random()*texts.length)]}`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 10) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

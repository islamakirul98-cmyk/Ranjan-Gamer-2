<style>
    .score-container {
        background: #1e1e1e;
        color: white;
        border-radius: 15px;
        padding: 20px;
        width: 90%;
        max-width: 500px;
        margin: 20px auto;
        border: 2px solid #ffcc00;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
        text-align: center;
        font-family: 'Arial', sans-serif;
    }

    .match-title {
        font-size: 14px;
        color: #aaa;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .teams {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
    }

    .score {
        color: #ffcc00;
        font-size: 24px;
        margin: 10px 0;
    }

    .status {
        background: #cc0000;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        display: inline-block;
        margin-top: 10px;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }

    .refresh-btn {
        background: #333;
        color: #ffcc00;
        border: 1px solid #ffcc00;
        padding: 5px 15px;
        border-radius: 20px;
        cursor: pointer;
        margin-top: 15px;
        font-size: 12px;
    }
</style>

<div class="score-container" id="score-box">
    <div class="match-title">Loading Live Match...</div>
    <div class="teams">
        <span id="team1">TEAM A</span>
        <span>VS</span>
        <span id="team2">TEAM B</span>
    </div>
    <div class="score" id="main-score">00/0 (0.0)</div>
    <div class="status" id="match-status">LIVE</div>
    <br>
    <button class="refresh-btn" onclick="fetchScore()">🔄 Refresh Score</button>
</div>

<script>
    async function fetchScore() {
        const scoreTitle = document.querySelector('.match-title');
        const scoreDisplay = document.getElementById('main-score');
        
        scoreTitle.innerText = "Updating...";
        
        try {
            // Note: Ye ek demo API endpoint hai. 
            // Real match ke liye aap 'cricketdata.org' ki free API key le kar yahan daal sakte hain.
            const response = await fetch('https://api.cricapi.com/v1/currentMatches?apikey=YOUR_FREE_API_KEY&offset=0');
            const data = await response.json();
            
            if(data.status === "success") {
                const match = data.data[0]; // Pehla live match uthayega
                document.getElementById('team1').innerText = match.teams[0];
                document.getElementById('team2').innerText = match.teams[1];
                scoreDisplay.innerText = match.status; // Current score update
                scoreTitle.innerText = match.name;
            }
        } catch (error) {
            scoreTitle.innerText = "Match: IND vs PAK (Sample)";
            scoreDisplay.innerText = "184/3 (18.2)";
            console.log("API Error, showing sample data.");
        }
    }

    // Har 30 second mein automatic update
    setInterval(fetchScore, 30000);
    fetchScore(); // Pehli baar load hone par
</script>

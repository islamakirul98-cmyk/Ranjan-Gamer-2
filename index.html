<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER PRO OTT</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0b1119; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* HEADER BANNER */
        .hero { 
            width: 100%; padding: 40px 0; 
            background: linear-gradient(180deg, #1a242f 0%, #0b1119 100%);
            text-align: center; border-bottom: 3px solid #ff0050;
        }
        .hero img { width: 120px; border-radius: 50%; border: 3px solid #ff0050; box-shadow: 0 0 20px #ff0050; }
        .hero h1 { font-size: 35px; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* PLAYER BOX */
        .player-area { background: #000; padding: 20px; text-align: center; }
        .video-js { width: 100% !important; max-width: 850px; height: 480px !important; margin: 0 auto; border-radius: 12px; }

        /* JIOHOTSTAR STYLE GRID */
        .grid-container { padding: 30px; }
        .grid-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid #ff0050; padding-left: 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { 
            background: #161e29; border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #252e39;
        }
        .card:hover { transform: translateY(-5px); border-color: #ff0050; }
        .card img { width: 100%; height: 90px; object-fit: contain; background: #fff; padding: 10px; }
        .card p { padding: 10px; margin: 0; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://i.postimg.cc/856vj6xN/Ranjan-Gamer-Logo.png" alt="Ranjan Gamer">
        <h1>RANJAN GAMER <span style="color:#ff0050">PRO OTT</span></h1>
    </div>

    <div class="player-area">
        <video id="main-vid" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
            <source src="http://116.90.120.151:8000/play/a0hi/index.m3u8" type="application/x-mpegURL">
        </video>
        <p id="now-title" style="margin-top:15px; color:#00d2ff;">Playing: Main Gaming Stream</p>
    </div>

    <div class="grid-container">
        <div class="grid-title">LIVE SPORTS CHANNELS</div>
        <div class="grid">
            <div class="card" onclick="playChan('http://116.90.120.151:8000/play/a0hi/index.m3u8', 'Main Stream')">
                <img src="https://i.postimg.cc/856vj6xN/Ranjan-Gamer-Logo.png"><p>Main Feed</p>
            </div>
            <div class="card" onclick="playChan('https://linear-241.voot.com/eleven/voot_sports_1_hd/index.m3u8', 'Sports 1')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Star_Sports_logo.svg/1200px-Star_Sports_logo.svg.png"><p>Star Sports</p>
            </div>
            <div class="card" onclick="playChan('https://linear-143.voot.com/eleven/voot_sports_2_hd/index.m3u8', 'Sports 2')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Sony_Ten_logo.png/640px-Sony_Ten_logo.png"><p>Sony Ten</p>
            </div>
            </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('main-vid');
        function playChan(url, name) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            document.getElementById('now-title').innerText = "Playing: " + name;
            window.scrollTo({top: 300, behavior: 'smooth'});
        }
    </script>
</body>
</html>

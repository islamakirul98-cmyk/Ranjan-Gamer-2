<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | PRO APP</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        :root { --bg: #0f1014; --card: #1a1c22; --accent: #ffcc00; --live: #ff0037; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 20px; }

        /* NAVBAR */
        .navbar { height: 60px; display: flex; align-items: center; padding: 0 20px; background: #0b0c0f; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 18px; font-weight: 900; color: var(--accent); }

        /* BANNER */
        .main-banner { 
            width: 94%; height: 180px; margin: 15px auto; 
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent), url('https://img1.hotstarext.com/image/upload/f_auto,t_web_m_1x/sources/r1/cms/prod/4255/1364255-h-b789e5a5a5');
            background-size: cover; border-radius: 12px; display: flex; align-items: flex-end; padding: 20px; border: 1px solid #333; cursor: pointer;
        }

        /* PLAYER MODAL SCREEN */
        #app-player-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; }
        
        .player-container { width: 100%; background: #000; position: sticky; top: 0; z-index: 2100; border-bottom: 2px solid var(--accent); }
        .video-js { width: 100% !important; height: 230px !important; }

        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 35px; color: #fff; z-index: 2200; cursor: pointer; text-shadow: 0 0 10px #000; }

        /* LIST BELOW VIDEO */
        .list-container { padding: 15px; }
        .list-title { font-size: 16px; font-weight: bold; color: var(--accent); margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .app-item { 
            display: flex; align-items: center; background: var(--card); 
            padding: 10px; border-radius: 10px; margin-bottom: 10px; 
            border: 1px solid #2a2d36; cursor: pointer; transition: 0.2s;
        }
        .app-item:active { background: #252830; transform: scale(0.98); }
        .app-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: contain; background: #222; padding: 5px; margin-right: 15px; }
        .item-info h4 { margin: 0; font-size: 15px; }
        .item-info p { margin: 3px 0 0; font-size: 12px; color: #888; }
        .live-label { margin-left: auto; color: var(--live); font-size: 10px; font-weight: bold; border: 1px solid var(--live); padding: 2px 6px; border-radius: 4px; }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.5;} }
    </style>
</head>
<body>

    <nav class="navbar"><div class="logo">RANJAN GAMER PRO</div></nav>

    <div class="main-banner" onclick="openAppPlayer('https://oppu.freelivtv.workers.dev/play.m3u8?id=167574', 'Special Live Match')">
        <div>
            <div style="color:var(--accent); font-size:12px; font-weight:bold; margin-bottom:5px;">● LIVE STREAMING</div>
            <h2 style="margin:0;">Cricket: IND vs ENG</h2>
            <p style="font-size:12px; color:#ccc;">Click to open player & channel list</p>
        </div>
    </div>

    <div id="app-player-screen">
        <span class="close-btn" onclick="closeAppPlayer()">×</span>
        
        <div class="player-container">
            <video id="main-player" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto">
                <source src="" type="application/x-mpegURL">
            </video>
        </div>

        <div class="list-container">
            <div class="list-title" id="now-playing-title">Now Playing: Select Channel</div>
            
            <div class="app-item" onclick="changeChannel('https://oppu.freelivtv.workers.dev/play.m3u8?id=167574', 'Special Live Match')">
                <img src="https://via.placeholder.com/50?text=Live" alt="Live">
                <div class="item-info">
                    <h4>Special Cricket Live</h4>
                    <p>High Quality Stream</p>
                </div>
                <div class="live-label">LIVE</div>
            </div>

            <div class="app-item" onclick="changeChannel('https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8', 'Aaj Tak HD')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Aaj_Tak_Logo.png" alt="Aaj Tak">
                <div class="item-info">
                    <h4>Aaj Tak HD</h4>
                    <p>Sabse Tez News</p>
                </div>
                <div class="live-label">LIVE</div>
            </div>

            <div class="app-item" onclick="changeChannel('https://xlbor37ydvaj-hls-live.wmncdn.net/firstindianewstv1/live.stream/index.m3u8', 'First India News')">
                <img src="https://via.placeholder.com/50?text=News" alt="News">
                <div class="item-info">
                    <h4>First India News</h4>
                    <p>24x7 Regional News</p>
                </div>
                <div class="live-label">LIVE</div>
            </div>

        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('main-player');

        function openAppPlayer(url, title) {
            document.getElementById('app-player-screen').style.display = 'block';
            changeChannel(url, title);
        }

        function changeChannel(url, title) {
            document.getElementById('now-playing-title').innerText = "Playing: " + title;
            player.src({ type: 'application/x-mpegURL', src: url });
            player.play();
            // Scroll to top of the list when channel changes
            window.scrollTo(0,0);
        }

        function closeAppPlayer() {
            player.pause();
            document.getElementById('app-player-screen').style.display = 'none';
        }
    </script>
</body>
</html>

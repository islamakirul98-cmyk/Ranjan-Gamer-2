<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer | JioStar Live</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #030b17; --nav: #121921; --blue: #1f80e0; --card-bg: #192133; --live-red: #ff0000; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }

        /* Navbar */
        .navbar { background: var(--nav); height: 72px; display: flex; align-items: center; padding: 0 4%; position: fixed; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { height: 42px; border-radius: 5px; border: 1px solid var(--blue); margin-right: 20px; }

        /* Layout */
        .main-container { padding-top: 72px; display: flex; flex-wrap: wrap; background: #000; }
        .player-section { flex: 3; min-width: 350px; }
        .video-js { width: 100% !important; height: 500px !important; }

        /* --- FAKE CHAT SIDEBAR --- */
        .chat-section { flex: 1; min-width: 300px; background: #0f171e; height: 500px; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: #1a242f; font-weight: bold; color: var(--blue); border-bottom: 1px solid #333; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 12px; font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
        .m-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; border-left: 3px solid var(--blue); }
        .u-name { color: #00d2ff; font-weight: bold; margin-right: 5px; }

        /* --- JIOSTAR STYLE SCORECARD --- */
        .scorecard-bar { background: #1a242f; padding: 15px 4%; border-bottom: 2px solid var(--blue); }
        .score-row { display: flex; justify-content: space-between; align-items: center; }
        .team-info { display: flex; align-items: center; gap: 15px; }
        .team-name { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .live-score { font-size: 28px; font-weight: 900; color: #fff; }
        .overs { font-size: 14px; color: #888; margin-left: 10px; }
        
        .batting-stats { margin-top: 15px; display: flex; gap: 30px; font-size: 14px; color: #ccc; border-top: 1px solid #333; padding-top: 10px; }
        .batsman.active { color: #ffcc00; font-weight: bold; }
        .batsman.active::after { content: '*'; margin-left: 3px; }

        .last-balls { display: flex; gap: 8px; align-items: center; margin-top: 15px; }
        .ball { width: 25px; height: 25px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .ball.four { background: #1f80e0; }
        .ball.six { background: #6a1b9a; }
        .ball.wicket { background: #d32f2f; }

        .v-count { color: var(--live-red); font-size: 12px; font-weight: bold; display: flex; align-items: center; margin-top: 5px; }
        .v-dot { height: 6px; width: 6px; background: var(--live-red); border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000034992.png" class="nav-logo" alt="Ranjan Gamer" onerror="this.src='https://via.placeholder.com/150?text=RANJAN'">
        <span style="font-weight:900; color:var(--blue); letter-spacing:1px;">JIOSTAR LIVE</span>
    </nav>

    <div class="main-container">
        <div class="player-section">
            <video id="ott-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted>
                <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div class="chat-section">
            <div class="chat-header">COMMENTS</div>
            <div id="chat-msgs" class="chat-msgs">
                <div class="m-box"><span class="u-name">Admin:</span> Welcome to Ranjan Gamer Live Scorecard!</div>
            </div>
        </div>
    </div>

    <div class="scorecard-bar">
        <div class="score-row">
            <div class="team-info">
                <span class="team-name">IND <span style="font-size:16px; font-weight:normal; color:#888;">vs</span> AUS</span>
                <span class="live-score" id="main-score">184/3 <span class="overs">(17.4)</span></span>
            </div>
            <div class="v-count"><span class="v-dot"></span> <span id="views">54</span> Watching</div>
        </div>

        <div class="batting-stats">
            <div class="batsman active">V. Kohli: <span id="bat1">74(42)</span></div>
            <div class="batsman">H. Pandya: <span id="bat2">12(8)</span></div>
            <div style="margin-left:auto; color:#888;">CRR: 10.41</div>
        </div>

        <div class="last-balls" id="recent-balls">
            <span style="font-size:12px; color:#888; margin-right:5px;">Last 6 balls:</span>
            <div class="ball">1</div>
            <div class="ball four">4</div>
            <div class="ball">0</div>
            <div class="ball six">6</div>
            <div class="ball wicket">W</div>
            <div class="ball">2</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('ott-player');

        // 1. FAKE LIVE VIEWS (50-60)
        setInterval(() => {
            let v = Math.floor(Math.random() * (60 - 50 + 1)) + 50;
            document.getElementById('views').innerText = v;
        }, 4000);

        // 2. FAKE CHAT (Sports focused)
        const u = ["CricketExpert", "Ritesh_Bihar", "StarSports_Fan", "Kohli_G.O.A.T", "Rahul_YT"];
        const t = ["What a shot by Kohli! 🔥", "India match jitegi pakka", "Love from Bihar ❤️", "Sixer!!! Mast quality hai", "Wicket kab girega?", "Bowling bahut tight hai"];
        
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.className = 'm-box';
            d.innerHTML = `<span class="u-name">${u[Math.floor(Math.random()*u.length)]}:</span> ${t[Math.floor(Math.random()*t.length)]}`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 12) cb.removeChild(cb.firstChild);
        }, 3500);

        // 3. FAKE SCORECARD UPDATE
        let runs = 184;
        let balls = 106; // 17.4 overs
        setInterval(() => {
            runs += Math.floor(Math.random() * 2); // 0 or 1 run
            balls++;
            let overs = Math.floor(balls/6) + "." + (balls%6);
            document.getElementById('main-score').innerHTML = `${runs}/3 <span class="overs">(${overs})</span>`;
            document.getElementById('bat1').innerText = (runs - 110) + "(45)";
        }, 8000);
    </script>
</body>
</html>

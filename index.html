<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | LIVE SCORE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --card: #11171e; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 50px; }

        /* NAVBAR */
        .navbar { background: #0d1117; height: 65px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; }
        .nav-brand { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* --- CUSTOM CREX STYLE SCORECARD (UPAR) --- */
        .crex-box { 
            background: var(--card); margin: 15px; border-radius: 15px; padding: 20px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .match-info { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        .score-row { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; align-items: center; gap: 12px; }
        .team img { width: 40px; height: 28px; border-radius: 4px; border: 1px solid #333; }
        .team-name { font-size: 20px; font-weight: bold; color: #fff; }
        .main-score { font-size: 30px; font-weight: 900; letter-spacing: -1px; }
        .overs { font-size: 14px; color: #8b949e; margin-left: 8px; font-weight: normal; }

        .stats-strip { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 14px; color: #c9d1d9; }
        .active-bat { color: var(--blue); font-weight: bold; }

        /* PLAYER SECTION (MIDDLE) */
        .video-container { background: #000; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .video-js { width: 100% !important; max-width: 900px; height: 450px !important; margin: 0 auto; }

        /* COMMENTS SECTION (BOTTOM) */
        .comment-section { padding: 25px 5%; }
        .comment-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--blue); padding-left: 12px; color: var(--blue); }
        .chat-box { background: var(--card); border-radius: 12px; height: 300px; overflow-y: auto; padding: 15px; border: 1px solid var(--border); }
        .msg { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; margin-bottom: 12px; border-left: 3px solid var(--accent); }
        .user { font-weight: bold; color: var(--blue); font-size: 13px; }
        .text { font-size: 13px; margin-left: 8px; color: #e6edf3; }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        @media (max-width: 768px) { .video-js { height: 280px !important; } .main-score { font-size: 24px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000035171.jpg" class="nav-logo" alt="RG" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="crex-box">
        <div class="match-info"><span class="dot"></span> Live • ICC Champions Trophy • London</div>
        <div class="score-row">
            <div class="team">
                <img src="https://flagcdn.com/w80/in.png">
                <span class="team-name">IND</span>
            </div>
            <div class="main-score" id="runs-txt">184/3 <span class="overs" id="ov-txt">(17.4)</span></div>
            <div class="team">
                <span class="team-name">AUS</span>
                <img src="https://flagcdn.com/w80/au.png">
            </div>
        </div>
        <div class="stats-strip">
            <div><span class="active-bat">V. Kohli*</span> <span id="bat1">74(42)</span></div>
            <div><span>H. Pandya</span> <span id="bat2">12(8)</span></div>
            <div style="color:var(--accent)">CRR: 10.41</div>
        </div>
    </div>

    <div class="video-container">
        <video id="rg-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted preload="auto">
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="comment-section">
        <div class="comment-title">Live Match Chat</div>
        <div id="chat-msgs" class="chat-box">
            <div class="msg"><span class="user">System:</span> Real-time Scorecard Active! Enjoy the match.</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-video');

        // Scoreboard Update Script
        let runs = 184, balls = 106;
        setInterval(() => {
            runs += Math.floor(Math.random() * 2); 
            balls++;
            let overs = Math.floor(balls/6) + "." + (balls%6);
            document.getElementById('runs-txt').innerHTML = `${runs}/3 <span class="overs">(${overs})</span>`;
            document.getElementById('bat1').innerText = (runs - 110) + "(45)";
        }, 7000);

        // Chat Script
        const users = ["Bihar_Gamer", "Ritesh_Cricket", "Ranjan_Fan_1", "Saurav_Live", "Rahul_YT"];
        const texts = ["India jitegi pakka 🇮🇳", "Ranjan bhai stream mast hai", "Love from Bihar ❤️", "Kohli is the real GOAT 👑", "Kya match chal raha hai 🔥"];
        
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> <span class="text">${texts[Math.floor(Math.random()*texts.length)]}</span>`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 10) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

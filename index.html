<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | MULTI-LIVE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; height: 100%; overflow: hidden; }

        /* Scroll Container */
        .main-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Scroll karne pe auto-fit hoga */
        }

        /* Each Video Slide */
        .video-slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid var(--border);
        }

        .navbar { background: rgba(13, 17, 23, 0.8); height: 50px; display: flex; align-items: center; padding: 0 15px; position: absolute; width: 100%; z-index: 10; }
        .nav-logo { height: 35px; width: 35px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 10px; }
        .nav-brand { font-size: 16px; font-weight: 900; }

        /* Player Box */
        .player-wrapper { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* UI Overlays (Score & Chat) */
        .overlay-ui { position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 5; pointer-events: none; }
        .score-mini { background: rgba(17, 23, 30, 0.9); padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; pointer-events: auto; }
        .chat-mini { height: 120px; overflow: hidden; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 8px; font-size: 12px; pointer-events: auto; }
        
        .msg { margin-bottom: 5px; animation: fadeIn 0.3s ease; }
        .u-name { color: var(--blue); font-weight: bold; }
        
        .scroll-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--blue); animation: bounce 2s infinite; font-size: 20px; }

        @keyframes bounce { 0%, 100% {transform: translateY(-50%);} 50% {transform: translateY(-30%);} }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="video-slide">
            <nav class="navbar">
                <img src="17741693376793666156839165925370.png" class="nav-logo">
                <span class="nav-brand">RG LIVE <span style="color:var(--accent)">MATCH 1</span></span>
            </nav>
            <div class="player-wrapper">
                <video id="player1" class="video-js vjs-default-skin" controls preload="auto" muted>
                    <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
                </video>
            </div>
            <div class="scroll-hint">↑<br>↓</div>
            <div class="overlay-ui">
                <div class="score-mini">🔴 LIVE Score: NZ 252/4 (80.1 ov)</div>
                <div class="chat-mini" id="chat1"></div>
            </div>
        </div>

        <div class="video-slide">
            <nav class="navbar">
                <img src="17741693376793666156839165925370.png" class="nav-logo">
                <span class="nav-brand">RG LIVE <span style="color:var(--accent)">MATCH 2</span></span>
            </nav>
            <div class="player-wrapper">
                <video id="player2" class="video-js vjs-default-skin" controls preload="auto" muted>
                    <source src="https://xlbor37ydvaj-hls-live.wmncdn.net/firstindianewstv1/live.stream/index.m3u8" type="application/x-mpegURL">
                </video>
            </div>
            <div class="overlay-ui">
                <div class="score-mini">🔵 Live Stream: First India News</div>
                <div class="chat-mini" id="chat2"></div>
            </div>
        </div>

    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // Players Initialize
        const p1 = videojs('player1');
        const p2 = videojs('player2');

        // Fake Chat Script for both
        const users = ["Ranjan_Fan", "IPL_Expert", "Bihar_Boy"];
        const texts = ["Maza aa gaya bhai!", "Quality ekdum HD hai", "Thanks for the link"];

        function autoChat(chatId) {
            setInterval(() => {
                const win = document.getElementById(chatId);
                const d = document.createElement('div');
                d.className = 'msg';
                d.innerHTML = `<span class="u-name">${users[Math.floor(Math.random()*3)]}:</span> ${texts[Math.floor(Math.random()*3)]}`;
                win.appendChild(d);
                win.scrollTop = win.scrollHeight;
                if(win.children.length > 5) win.removeChild(win.firstChild);
            }, 5000);
        }

        autoChat('chat1');
        autoChat('chat2');

        // Auto play/pause logic on scroll
        const container = document.querySelector('.main-container');
        container.addEventListener('scroll', () => {
            const scrollPos = container.scrollTop;
            const windowHeight = window.innerHeight;

            if (scrollPos < windowHeight / 2) {
                p1.play(); p2.pause();
            } else {
                p1.pause(); p2.play();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | ASLI LIVE SCORE</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05080b; --card: #11171e; --accent: #ff0050; --blue: #00d2ff; --border: #1f262e; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; }

        /* NAVBAR */
        .navbar { background: #0d1117; height: 65px; display: flex; align-items: center; padding: 0 4%; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .nav-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); margin-right: 12px; }
        .nav-brand { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* --- REAL SCORECARD CONTAINER (TOP) --- */
        .score-container { 
            padding: 10px; background: var(--bg); 
            display: flex; justify-content: center;
        }
        /* Asli Score Widget Ka Box */
        .asli-score-box {
            width: 100%; max-width: 900px; height: 160px; 
            background: #1a1a1a; border-radius: 12px; 
            overflow: hidden; border: 1px solid var(--border);
        }

        /* PLAYER SECTION (MIDDLE) */
        .video-container { background: #000; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-top: 5px; }
        .video-js { width: 100% !important; max-width: 950px; height: 450px !important; margin: 0 auto; }

        /* COMMENTS SECTION (BOTTOM) */
        .comment-area { padding: 25px 5%; }
        .comment-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: var(--blue); border-left: 5px solid var(--blue); padding-left: 12px; }
        .chat-box { background: var(--card); border-radius: 12px; height: 250px; overflow-y: auto; padding: 15px; border: 1px solid var(--border); }
        .msg { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
        .user { font-weight: bold; color: var(--blue); font-size: 13px; }
        .text { font-size: 13px; color: #e6edf3; margin-left: 5px; }

        @media (max-width: 768px) { .video-js { height: 260px !important; } .asli-score-box { height: 180px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="1000035171.jpg" class="nav-logo" alt="RG" onerror="this.src='https://via.placeholder.com/150?text=RG'">
        <span class="nav-brand">RANJAN <span style="color:var(--accent)">GAMER</span></span>
    </nav>

    <div class="score-container">
        <div class="asli-score-box">
            <iframe src="https://m.cricbuzz.com/cricket-match/live-scores" 
                    style="width:100%; height:500px; border:none; margin-top:-180px;" 
                    scrolling="no"></iframe>
        </div>
    </div>

    <div class="video-container">
        <video id="rg-player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay muted preload="auto">
            <source src="https://amg01117-amg01117c1-amgplt0029.playout.now3.amagi.tv/playlist/amg01117-amg01117c1-amgplt0029/playlist.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="comment-area">
        <div class="comment-title">Live Fan Chat</div>
        <div id="chat-msgs" class="chat-box">
            <div class="msg"><span class="user">Admin:</span> Asli Scorecard Active hai! Enjoy.</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('rg-player');

        // Fake Chat (Ye toh humein daalna hi padega taaki log baatein karein)
        const users = ["Bihar_Boy", "Cricket_Guru", "Ranjan_Fan_1", "Saurav_Sports"];
        const texts = ["India match jitegi 🇮🇳", "Love from Bihar ❤️", "Stream quality mast hai bhai", "Asli score dikh raha hai ab!"];
        
        setInterval(() => {
            const cb = document.getElementById('chat-msgs');
            const d = document.createElement('div');
            d.className = 'msg';
            d.innerHTML = `<span class="user">${users[Math.floor(Math.random()*users.length)]}:</span> <span class="text">${texts[Math.floor(Math.random()*texts.length)]}</span>`;
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
            if(cb.children.length > 8) cb.removeChild(cb.firstChild);
        }, 4000);
    </script>
</body>
</html>

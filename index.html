<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer OTT | JioHotstar Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --main-color: #00d2ff; --bg-dark: #0f171e; --card-bg: #1a242f; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Header Styling */
        .navbar { background: rgba(15, 23, 30, 0.95); border-bottom: 1px solid #333; }
        .navbar-brand { font-weight: bold; color: var(--main-color) !important; font-size: 24px; }
        
        /* Player Section */
        .player-wrapper { background: #000; padding: 20px 0; border-bottom: 2px solid var(--main-color); }
        .video-js { width: 100% !important; height: 500px !important; margin: 0 auto; border-radius: 8px; }

        /* Channel Grid */
        .channel-card { 
            background: var(--card-bg); border: none; transition: 0.3s; cursor: pointer; 
            border-radius: 10px; overflow: hidden; margin-bottom: 20px;
        }
        .channel-card:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--main-color); }
        .card-body { padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }
        .card-img-top { height: 120px; object-fit: contain; background: #fff; padding: 10px; }

        .section-title { margin: 30px 0 20px; font-weight: bold; border-left: 4px solid var(--main-color); padding-left: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">RANJAN<span>OTT</span></a>
        <div class="d-flex text-white align-items-center">
            <small class="me-3">Welcome, Ashish</small>
        </div>
    </div>
</nav>

<div class="player-wrapper">
    <div class="container">
        <video id="main-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay muted>
            <source src="http://116.90.120.151:8000/play/a0hi/index.m3u8" type="application/x-mpegURL">
        </video>
        <h4 id="now-playing" class="mt-3 text-info">Now Playing: Default Channel</h4>
    </div>
</div>

<div class="container">
    <h3 class="section-title">Live TV Channels</h3>
    <div class="row" id="channel-grid">
        </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const player = videojs('main-player');

    // --- APNE CHANNELS YAHAN ADD KAREIN ---
    const channels = [
        { name: "My Personal Channel", logo: "https://i.postimg.cc/856vj6xN/Ranjan-Gamer-Logo.png", url: "http://116.90.120.151:8000/play/a0hi/index.m3u8" },
        { name: "Star Sports 1", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Star_Sports_logo.svg/1200px-Star_Sports_logo.svg.png", url: "http://example.com/stream1.m3u8" },
        { name: "Sony Ten", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Sony_Ten_logo.png/640px-Sony_Ten_logo.png", url: "http://example.com/stream2.m3u8" },
        { name: "Disney+ Hotstar", logo: "https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_Hotstar_logo.png", url: "http://example.com/stream3.m3u8" }
    ];

    const grid = document.getElementById('channel-grid');

    channels.forEach(ch => {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-3 col-lg-2';
        col.innerHTML = `
            <div class="card channel-card">
                <img src="${ch.logo}" class="card-img-top" alt="${ch.name}">
                <div class="card-body">${ch.name}</div>
            </div>
        `;
        col.onclick = () => {
            player.src({ type: 'application/x-mpegURL', src: ch.url });
            player.play();
            document.getElementById('now-playing').innerText = "Now Playing: " + ch.name;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        grid.appendChild(col);
    });
</script>

</body>
</html>

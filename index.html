<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer Pro Live</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .header { margin-top: 20px; margin-bottom: 30px; }
        
        /* Logo Styling - Neon Effect */
        .logo { 
            width: 150px; 
            border-radius: 20px; 
            border: 3px solid #ff0050; 
            box-shadow: 0 0 25px #ff0050;
            background: #000;
            margin-bottom: 10px;
        }

        .player-box { 
            max-width: 900px; 
            margin: 0 auto; 
            border: 2px solid rgba(255, 0, 80, 0.5); 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 40px rgba(255, 0, 80, 0.3); 
        }
        .video-js { width: 100% !important; height: 500px !important; }
        
        h1 { 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 15px;
            text-shadow: 0 0 10px #ff0050;
        }
        .live-tag {
            color: #00ff00;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.ibb.co/v4v8f0D/Ranjan-Gamer-Logo.png" class="logo" alt="Ranjan Gamer Logo">
        <h1>Ranjan Gamer Live</h1>
        <div class="live-tag">● LIVE STREAMING</div>
    </div>

    <div class="player-box">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay muted>
            <source src="http://116.90.120.151:8000/play/a0hi/index.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <p style="color: #666; margin-top: 25px; font-size: 13px;">
        Note: Browser setting mein "Insecure Content" Allow karna na bhoolein.
    </p>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        player.ready(function() {
            player.play();
        });
    </script>
</body>
</html>

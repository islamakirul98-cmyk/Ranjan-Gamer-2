<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer Pro Live</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* Pro Gaming Theme CSS */
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0e12;
            color: #ffffff;
            font-family: 'Poppins', sans-serif; /* Modern gaming font */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- LOGO SECTION (Fixed & Beautiful) --- */
        .header-logo {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        .header-logo img {
            width: 150px;
            height: auto;
            border-radius: 50%;
            border: 4px solid rgba(255, 0, 80, 0.7); /* Glowing pinkish border */
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.5); /* Glowing effect */
            background-color: #000; /* Backdrop for logo clarity */
            padding: 5px;
        }

        /* --- PLAYER SECTION (Video with Glowing Border) --- */
        .player-container {
            width: 90%;
            max-width: 1000px;
            background-color: #1a1e26;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 2px solid rgba(255, 0, 80, 0.3);
            position: relative;
        }
        .video-js {
            width: 100% !important;
            height: 560px !important; /* Increased height for desktop */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 0, 80, 0.6);
            border: 2px solid #333;
        }

        /* Channel Status Text */
        .channel-info {
            text-align: center;
            margin-top: 15px;
            color: #ff0050; /* Signature pinkish-red color */
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .live-label {
            position: absolute;
            top: 25px;
            right: 25px;
            background-color: rgba(255, 0, 80, 0.9);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            z-index: 10;
        }
        .live-label::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .video-js { height: 300px !important; }
            .header-logo img { width: 100px; }
            .player-container { width: 95%; padding: 10px; }
            .channel-info { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <img src="https://raw.githubusercontent.com/islamakiru198-cmyk/Ranjan-Gamer-2/main/1000034992.png" alt="Ranjan Gamer Logo">
    </div>

    <div class="player-container">
        <div class="live-label">LIVE</div>

        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" autoplay fluid>
            <source src="http://116.90.120.151:8000/play/a0hi/index.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a></p>
        </video>

        <div class="channel-info">Status: Connected | Playing: Gaming Feed</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        var player = videojs('my-video', {
            autoplay: true, // Attempt autoplay
            nativeControlsForTouch: true
        });

        // Error handling if stream fails again
        player.on('error', function() {
            document.querySelector('.channel-info').innerText = 'Error: Stream format not supported by browser.';
            document.querySelector('.channel-info').style.color = 'red';
            alert("Ranjan Bhai, Browser main insecure content blocking issue hai. Chrome address bar main 'Insecure content' ko 'Allow' kariye stream chalane ke liye.");
        });
    </script>
</body>
</html>

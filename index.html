<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranjan Gamer Live - Pro Theme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS Variables for Themes --- */
        :root {
            /* Default Dark Mode (Jio Style) */
            --bg-body: #0c111b;
            --bg-nav: #141b29;
            --text-main: #ffffff;
            --text-sub: #8894ab;
            --accent-blue: #1f80e0;
            --card-bg: #141b29;
            --border-line: #1f80e0;
        }

        /* Light Mode Colors */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-nav: #ffffff;
            --text-main: #1c1e21;
            --text-sub: #606770;
            --accent-blue: #0056b3;
            --card-bg: #ffffff;
            --border-line: #0056b3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* 1. Header with Theme Toggle Logo */
        header {
            background-color: var(--bg-nav);
            padding: 12px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--border-line);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .logo span { color: var(--accent-blue); }

        /* Theme Toggle Icon */
        #theme-toggle {
            font-size: 22px;
            cursor: pointer;
            color: var(--accent-blue);
            transition: transform 0.3s;
        }
        #theme-toggle:hover { transform: rotate(30deg); }

        /* 2. Banner */
        .banner {
            width: 90%;
            height: 180px;
            margin: 20px auto;
            background: linear-gradient(45deg, var(--accent-blue), #000);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 20px;
            color: white;
        }

        /* 3. Grid & Cards */
        .tray-container { padding: 10px 5%; }
        .tray-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(128,128,128,0.2);
            transition: 0.3s;
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }

        .item-card img { width: 100%; height: 160px; object-fit: cover; }
        .item-info { padding: 8px; font-size: 14px; text-align: center; }

        /* 4. Bottom Nav (App Feel) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--bg-nav);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(128,128,128,0.2);
        }
        .nav-link { color: var(--text-sub); text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link.active { color: var(--accent-blue); }
        .nav-link i { font-size: 20px; display: block; }

    </style>
</head>
<body>

    <header>
        <div class="logo">RANJAN <span>GAMER</span></div>
        <div id="theme-toggle">
            <i class="fas fa-moon" id="theme-icon"></i>
        </div>
    </header>

    <div class="banner">
        <div>
            <h2 style="margin:0">IPL 2026 LIVE</h2>
            <p style="font-size:14px">High Quality | Low Data</p>
        </div>
    </div>

    <div class="tray-container">
        <div class="tray-title">Live Channels</div>
        <div class="items-grid">
            <div class="item-card">
                <img src="https://via.placeholder.com/150x200?text=Star+Sports" alt="Star">
                <div class="item-info">Star Sports 1</div>
            </div>
            <div class="item-card">
                <img src="https://via.placeholder.com/150x200?text=Sports+18" alt="S18">
                <div class="item-info">Sports 18</div>
            </div>
            <div class="item-card">
                <img src="https://via.placeholder.com/150x200?text=News+24" alt="News">
                <div class="item-info">Aaj Tak</div>
            </div>
            <div class="item-card">
                <img src="https://via.placeholder.com/150x200?text=Ranjan+Gaming" alt="Gaming">
                <div class="item-info">Ranjan Live</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-link"><i class="fas fa-tv"></i>Live</a>
        <a href="#" class="nav-link"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>

</body>
</html>

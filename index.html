<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RANJAN GAMER | LIVE EVENTS</title>
    <style>
        :root { --bg: #0b0f13; --card-bg: #161b22; --accent: #00ff88; --text: #ffffff; --border: #1f262e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }

        /* HEADER */
        .header { background: #12171d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; margin: 0; letter-spacing: 1px; }
        .update-bar { background: rgba(0, 255, 136, 0.1); color: var(--accent); padding: 8px; font-size: 12px; text-align: center; border: 1px dashed var(--accent); margin: 10px; border-radius: 5px; }

        /* MATCH LIST STYLE */
        .container { padding: 10px; }
        .match-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            margin-bottom: 15px; padding: 15px; position: relative; cursor: pointer;
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .league-name { font-size: 11px; color: #8b949e; text-align: center; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        
        .teams-row { display: flex; justify-content: space-between; align-items: center; }
        .team { text-align: center; width: 30%; }
        .team img { width: 45px; height: 45px; border-radius: 50%; background: #fff; padding: 2px; }
        .team-name { font-size: 13px; margin-top: 8px; font-weight: 500; }

        .match-details { text-align: center; width: 40%; }
        .time { font-size: 16px; font-weight: bold; color: var(--accent); }
        .date { font-size: 11px; color: #8b949e; margin-top: 4px; }
        .sport-type { background: #21262d; padding: 2px 10px; border-radius: 10px; font-size: 10px; display: inline-block; margin-top: 8px; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #12171d; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; color: #8b949e; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 20px;">☰</span>
        <h1>RANJAN GAMER TV</h1>
        <span style="font-size: 20px;">🔍</span>
    </div>

    <div class="update-bar">
        Welcome to Ranjan Gamer v4.5 • Watch Live Sports Here!
    </div>

    <div class="container">
        
        <div class="match-card" onclick="location.href='player.html?ch=1'">
            <div class="league-name">International Friendly</div>
            <div class="teams-row">
                <div class="team">
                    <img src="https://flagcdn.com/w80/in.png">
                    <div class="team-name">India</div>
                </div>
                <div class="match-details">
                    <div class="time">07:30 PM</div>
                    <div class="date">22/03/2026</div>
                    <div class="sport-type">Football</div>
                </div>
                <div class="team">
                    <img src="https://flagcdn.com/w80/my.png">
                    <div class="team-name">Malaysia</div>
                </div>
            </div>
        </div>

        <div class="match-card" onclick="location.href='player.html?ch=2'">
            <div class="league-name">ICC Champions Trophy</div>
            <div class="teams-row">
                <div class="team">
                    <img src="https://flagcdn.com/w80/nz.png">
                    <div class="team-name">New Zealand</div>
                </div>
                <div class="match-details">
                    <div class="time">03:40 PM</div>
                    <div class="date">LIVE</div>
                    <div class="sport-type">Cricket</div>
                </div>
                <div class="team">
                    <img src="https://flagcdn.com/w80/za.png">
                    <div class="team-name">South Africa</div>
                </div>
            </div>
        </div>

        <div class="match-card" onclick="location.href='player.html?ch=3'">
            <div class="league-name">IPL 2026</div>
            <div class="teams-row">
                <div class="team">
                    <img src="https://upload.wikimedia.org/wikipedia/en/2/2b/Mumbai_Indians_Logo.svg">
                    <div class="team-name">MI</div>
                </div>
                <div class="match-details">
                    <div class="time">08:00 PM</div>
                    <div class="date">Coming Soon</div>
                    <div class="sport-type">Cricket</div>
                </div>
                <div class="team">
                    <img src="https://upload.wikimedia.org/wikipedia/en/2/2a/Royal_Challengers_Bangalore_Logo.svg">
                    <div class="team-name">RCB</div>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><span class="nav-icon">📡</span>Live Events</div>
        <div class="nav-item"><span class="nav-icon">🏏</span>Sports</div>
        <div class="nav-item"><span class="nav-icon">📺</span>Categories</div>
    </div>

</body>
</html>
